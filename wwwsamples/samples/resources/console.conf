<columns>
	<nom>
		type = data
		label = Nom
		#width=200
		sortable
		sort_method = server
		sort_url = index.php?sample=console&sort=nom
	</nom>
	<prenom>
		type = data
		label = Prénom
	</prenom>
	<website>
		type=link
		label=Site Web
		responsive = 2
	</website>
	<email>
		type=mailto
		label=Adresse mail
		encoded=true
		sortable
		sort_method = client
		responsive = 1
		max_width = 150
	</email>
	<add_date>
		type = data
		label = Date d'ajout
		align = right
		sortable
		sort_method = client
	</add_date>
	<details>
		type=details
		label= Voir
		title= Informations détaillées
		window_with = 550
		window_height = 400
	</details>
	<delete>
		type=delete
		label=Supprimer
		url = delete.php
	</delete>
	<modif>
		type=modify
		label=Modifier
		url=modify.php
	</modif>
</columns>

<toolbar>
	<native_export>
		label = Exporter
		columns = nom,prenom,email
		filename = export.csv
	</native_export>
	<native_printable>
		label = Version imprimable
		columns = nom,prenom,email
	</native_printable>

	#<toolname>
	#	label = Ce qui s'affiche sur le bouton
	#	url = le lien (peut être spécifié après l'instnciation avec la methode setToolbarUrlFor($toolname, $value)
	#<toolname>
	# 
	# Si toolname est add, pdf, export ou spreadsheet, le bouton aura une icone
</toolbar>

expandable
expand_url = samples/resources/sample_content_for_mconsole_expanded_row.txt
# C'est une url de base. L'id de la colonne sera automatiquement ajouté avec ?id= ou &id= si l'url a déja des paramètres
# Dans cet exemple c'est un fichier texte, le paramètre ne sera donc pas pris en compte,
# et c'est donc toujours la même chose qui apparaitra.

<footer>
	colgroups = "1,7"
	align = "left,left"
</footer>