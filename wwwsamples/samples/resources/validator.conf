<testtext>
	type = string
	maxlength = 15
	regex = /^[A-Z0-9-_]+[A-Z0-9]/
	required
	error_required = Veuillez saisir un TEXT
	error_maxlength = Text trop long (Max : 15 caractères)
	error_regex = Le champ TEXT doit ne doit utiliser que des majuscules, chiffres, tirets et underscores.
</testtext>
<testselect>
	type = enum
	<options>
		type = constant
		values = 1/2
	</options>
	required
	error_required = Veuillez sélectionner une valeur du champ SELECT
</testselect>
<testnumber>
	type = integer
	min = 1
	max = 100
	error = NUMBER doit être compris entre 1 et 100
	error_type = NUMBER doit être un nombre entier
</testnumber>
<testdate>
	type = datetime
	format = d/m/Y H:i
	min = D
	max = D + 365
	error_min = Veuillez indiquer une date supérieure à aujourd'hui
	error_max = Veuillez indiquer une date comprise entre aujourd'hui et l'année prochaine
	error_format = Mauvais format de date
	error_type = Date invalide
</testdate>